<!DOCTYPE html>
<html>
<head>
    <title>Quiz Application</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        .option-btn {
            display: block;
            margin: 8px auto;
            padding: 8px 15px;
            width: 200px;
        }

        #result {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Simple Quiz App</h2>

    <div id="quizContainer">
        <h3 id="question"></h3>
        <div id="options"></div>
    </div>

    <div id="result"></div>

    <script>
        // Quiz Questions (Array of Objects)
        const quizData = [
            {
                question: "Which language runs in the browser?",
                options: ["Java", "C", "Python", "JavaScript"],
                answer: "JavaScript"
            },
            {
                question: "What does DOM stand for?",
                options: ["Document Object Model", "Data Object Model", "Digital Output Mode", "Desktop Oriented Mode"],
                answer: "Document Object Model"
            },
            {
                question: "Which symbol is used for comments in JavaScript?",
                options: ["//", "##", "<!-- -->", "**"],
                answer: "//"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const questionElement = document.getElementById("question");
        const optionsElement = document.getElementById("options");
        const resultElement = document.getElementById("result");

        function loadQuestion() {
            let currentQuestion = quizData[currentQuestionIndex];
            questionElement.textContent = currentQuestion.question;

            optionsElement.innerHTML = "";

            currentQuestion.options.forEach(function(option) {
                let button = document.createElement("button");
                button.textContent = option;
                button.classList.add("option-btn");

                button.onclick = function() {
                    checkAnswer(option);
                };

                optionsElement.appendChild(button);
            });
        }

        function checkAnswer(selectedOption) {
            let correctAnswer = quizData[currentQuestionIndex].answer;

            if (selectedOption === correctAnswer) {
                score++;
            }

            currentQuestionIndex++;

            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quizContainer").style.display = "none";
            resultElement.textContent = 
                "Quiz Completed! Your Score: " + score + " / " + quizData.length;
        }

        // Start Quiz
        loadQuestion();
    </script>

</body>
</html>
